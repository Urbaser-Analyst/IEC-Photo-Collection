<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Urbaser Sumeet Field Activity</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5fbfd;
    margin:0;
}

.header{
    background:#0b5cab;
    color:#fff;
    padding:15px;
    text-align:center;
}

.card{
    max-width:700px;
    margin:15px auto;
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 12px rgba(0,0,0,.15);
}

select,input,textarea,button{
    width:100%;
    padding:12px;
    margin:8px 0;
    box-sizing:border-box;
}

button{
    background:#14b8a6;
    color:#fff;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

#preview{
    width:100%;
    margin-top:10px;
    display:none;
    border-radius:8px;
    border:1px solid #ccc;
}

#gpsStatus{
    font-weight:bold;
    margin-bottom:10px;
}
</style>

</head>

<body>

<div class="header">
    <h2>URBASER SUMEET</h2>
    <div>Field Activity Reporting</div>
</div>

<div class="card">

<div id="gpsStatus">Getting GPS...</div>

<select id="zone">
<option value="">Select Zone</option>
</select>

<select id="ward">
<option value="">Select Ward</option>
</select>

<select id="route">
<option value="">Select Route</option>
</select>

<input type="text" id="type" placeholder="Type">

<textarea id="remarks" placeholder="Remarks"></textarea>

<input
type="file"
id="camera"
accept="image/*"
capture="environment">

<img id="preview">

<button onclick="submitForm()">Submit</button>

</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>

const WEBAPP_URL =
"https://script.google.com/macros/s/AKfycbwuPBToot8XEssger232JF5tDPKSK9hP3M3ygWU9U86qkmS_XRJdPOyQU7EhiLWQxY3MQ/exec";

const zoneSelect = document.getElementById("zone");
const wardSelect = document.getElementById("ward");
const routeSelect = document.getElementById("route");

const typeInput = document.getElementById("type");
const remarksInput = document.getElementById("remarks");
const cameraInput = document.getElementById("camera");
const previewImg = document.getElementById("preview");

let lat="";
let lng="";
let gpsAcc="";
let routeData=[];
let watermarked="";


// GPS
navigator.geolocation.getCurrentPosition(

function(position){

    lat = position.coords.latitude;
    lng = position.coords.longitude;
    gpsAcc = position.coords.accuracy;

    document.getElementById("gpsStatus").innerHTML =
    "📍 GPS OK | Accuracy : " +
    Math.round(gpsAcc) +
    " m";

},

function(error){

    document.getElementById("gpsStatus").innerHTML =
    "❌ GPS Permission Denied";

},

{
    enableHighAccuracy:true
}

);


// Load Route Master
fetch(WEBAPP_URL)

.then(response => response.json())

.then(data => {

    console.log("Route Data",data);

    routeData = data;

    const zones =
    [...new Set(data.map(item => item.Zone))];

    zones.forEach(zone => {

        zoneSelect.add(
            new Option(zone,zone)
        );

    });

})

.catch(error => {

    console.error(error);

    alert(
        "Unable to load Route Master. Check Apps Script Deployment."
    );

});


// Zone Change
zoneSelect.addEventListener("change",function(){

    wardSelect.innerHTML =
    '<option value="">Select Ward</option>';

    routeSelect.innerHTML =
    '<option value="">Select Route</option>';

    const wards =
    [...new Set(
        routeData
        .filter(item =>
            item.Zone == zoneSelect.value
        )
        .map(item => item.Ward)
    )];

    wards.forEach(ward => {

        wardSelect.add(
            new Option(ward,ward)
        );

    });

});


// Ward Change
wardSelect.addEventListener("change",function(){

    routeSelect.innerHTML =
    '<option value="">Select Route</option>';

    routeData
    .filter(item =>

        item.Zone == zoneSelect.value &&
        item.Ward == wardSelect.value

    )
    .forEach(item => {

        routeSelect.add(
            new Option(
                item.Route,
                item.Route
            )
        );

    });

});


// Camera
cameraInput.addEventListener("change",function(e){

    const file =
    e.target.files[0];

    if(!file) return;

    const reader =
    new FileReader();

    reader.onload = function(event){

        createWatermark(
            event.target.result
        );

    };

    reader.readAsDataURL(file);

});



// Watermark
function createWatermark(src){

    const img = new Image();

    img.onload = function(){

        const canvas =
        document.getElementById("canvas");

        const ctx =
        canvas.getContext("2d");

        canvas.width = img.width;
        canvas.height = img.height;

        ctx.drawImage(
            img,
            0,
            0
        );

        const panelHeight = 220;

        ctx.fillStyle =
        "rgba(0,0,0,0.80)";

        ctx.fillRect(
            0,
            canvas.height-panelHeight,
            canvas.width,
            panelHeight
        );

        ctx.fillStyle =
        "#14b8a6";

        ctx.font =
        "bold 34px Arial";

        ctx.fillText(
            "URBASER SUMEET",
            20,
            canvas.height-170
        );

        ctx.fillStyle =
        "#ffffff";

        ctx.font =
        "24px Arial";

        ctx.fillText(
            "Zone : " + zoneSelect.value,
            20,
            canvas.height-125
        );

        ctx.fillText(
            "Ward : " + wardSelect.value,
            250,
            canvas.height-125
        );

        ctx.fillText(
            "Route : " + routeSelect.value,
            500,
            canvas.height-125
        );

        ctx.fillText(
            "Type : " + typeInput.value,
            20,
            canvas.height-80
        );

        ctx.fillText(
            "GPS : " +
            lat +
            ", " +
            lng,
            20,
            canvas.height-45
        );

        ctx.fillText(
            new Date().toLocaleString(),
            20,
            canvas.height-10
        );

        watermarked =
        canvas.toDataURL(
            "image/jpeg",
            0.90
        );

        previewImg.src =
        watermarked;

        previewImg.style.display =
        "block";

    };

    img.src = src;

}



// Submit
function submitForm(){

    if(zoneSelect.value===""){
        alert("Select Zone");
        return;
    }

    if(wardSelect.value===""){
        alert("Select Ward");
        return;
    }

    if(routeSelect.value===""){
        alert("Select Route");
        return;
    }

    if(!watermarked){
        alert("Capture Photo");
        return;
    }

    fetch(WEBAPP_URL,{

        method:"POST",

        body:JSON.stringify({

            zone:zoneSelect.value,
            ward:wardSelect.value,
            route:routeSelect.value,
            type:typeInput.value,
            remarks:remarksInput.value,
            latitude:lat,
            longitude:lng,
            photo:watermarked

        })

    })

    .then(response => response.text())

    .then(result => {

        alert(
            "Submitted Successfully"
        );

        location.reload();

    })

    .catch(error => {

        console.error(error);

        alert(
            "Submission Failed"
        );

    });

}

</script>

</body>
</html>
